        fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Content lines -->
  <line x1="42" y1="44"  x2="126" y2="44"  stroke="white" stroke-width="3"   stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="62"  x2="106" y2="62"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.3"/>
  <line x1="42" y1="78"  x2="120" y2="78"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.3"/>
  <line x1="42" y1="94"  x2="86"  y2="94"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.22"/>

  <!-- Magnifier lens at bottom-right corner -->
