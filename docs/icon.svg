  <line x1="14" y1="16" x2="40" y2="16" stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="22" x2="34" y2="22" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="14" y1="27" x2="37" y2="27" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <!-- Magnifier lens -->
  <circle cx="41" cy="48" r="12" fill="rgba(62,181,176,0.07)" stroke="white" stroke-width="1.5"/>
